<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=6c42bc19-1776-466a-900c-75c1c68e67f4" type="text/javascript"></script>

    <title>static_05_2026</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100vh;
            height: 100dvh;
        }

        .map-status {
            position: fixed;
            left: 50%;
            bottom: 20px;
            z-index: 1001;
            max-width: calc(100vw - 32px);
            padding: 8px 14px;
            transform: translateX(-50%);
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.12);
            background: rgba(255,255,255,0.96);
            color: #222;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13px;
            line-height: 1.25;
            box-shadow: 0 4px 14px rgba(0,0,0,0.16);
            text-align: center;
        }

        .map-status.error {
            border-color: #f87171;
            background: #fff1f2;
            color: #991b1b;
        }

        .map-status[hidden] {
            display: none;
        }

        .map-balloon {
            width: min(360px, calc(100vw - 96px));
            max-width: 100%;
            color: #111827;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .map-balloon__title {
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }

        .map-balloon__row {
            margin-top: 6px;
            font-size: 13px;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .map-balloon__label {
            font-weight: 700;
        }

        .map-balloon__quantity {
            color: #16a34a;
            font-weight: 700;
        }

        .map-balloon__photos {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .map-photo-button {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid rgba(37,99,235,0.35);
            border-radius: 8px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .map-photo-button:hover {
            background: #dbeafe;
        }

        .map-photo-button:disabled {
            cursor: wait;
            opacity: 0.72;
        }

        .map-photo-status {
            margin-top: 8px;
            color: #6b7280;
            font-size: 12px;
            line-height: 1.35;
        }

        .map-photo-status.error {
            color: #991b1b;
        }

        .map-photo-group {
            margin-top: 10px;
        }

        .map-photo-group__title {
            margin-bottom: 6px;
            color: #374151;
            font-size: 12px;
            font-weight: 700;
        }

        .map-photo-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .map-photo-link {
            display: block;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            background: #f3f4f6;
        }

        .map-photo-link img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .map-photo-modal {
            position: fixed;
            inset: 0;
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(17,24,39,0.55);
        }

        .map-photo-modal__panel {
            width: min(920px, calc(100vw - 32px));
            max-height: calc(100vh - 48px);
            max-height: calc(100dvh - 48px);
            overflow: hidden;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 18px 48px rgba(0,0,0,0.28);
        }

        .map-photo-modal__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .map-photo-modal__title {
            color: #111827;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.25;
        }

        .map-photo-modal__close {
            width: 34px;
            height: 34px;
            flex: 0 0 auto;
            border: 0;
            border-radius: 999px;
            background: #f3f4f6;
            color: #111827;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
        }

        .map-photo-modal__close:hover {
            background: #e5e7eb;
        }

        .map-photo-modal__body {
            max-height: calc(100vh - 132px);
            max-height: calc(100dvh - 132px);
            overflow-y: auto;
            padding: 16px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .map-photo-viewer {
            display: grid;
            gap: 14px;
        }

        .map-photo-viewer__stage {
            display: grid;
            grid-template-columns: 42px minmax(0, 1fr) 42px;
            gap: 10px;
            align-items: center;
        }

        .map-photo-viewer__nav {
            width: 42px;
            height: 56px;
            border: 0;
            border-radius: 8px;
            background: #f3f4f6;
            color: #111827;
            font-size: 30px;
            line-height: 1;
            cursor: pointer;
        }

        .map-photo-viewer__nav:hover {
            background: #e5e7eb;
        }

        .map-photo-viewer__image-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            max-height: min(58vh, 560px);
            overflow: hidden;
            border-radius: 8px;
            background: #111827;
        }

        .map-photo-viewer__image {
            display: block;
            width: 100%;
            height: 100%;
            max-height: min(58vh, 560px);
            object-fit: contain;
        }

        .map-photo-viewer__footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .map-photo-viewer__meta {
            min-width: 0;
            color: #374151;
            font-size: 13px;
            line-height: 1.35;
        }

        .map-photo-viewer__name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 700;
        }

        .map-photo-viewer__source {
            color: #6b7280;
        }

        .map-photo-viewer__actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .map-photo-viewer__counter {
            color: #6b7280;
            font-size: 13px;
            white-space: nowrap;
        }

        .map-photo-viewer__download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 7px 12px;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
        }

        .map-photo-viewer__download:hover {
            background: #1d4ed8;
        }

        .map-photo-thumbs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
            gap: 8px;
        }

        .map-photo-thumb {
            display: block;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 0;
            background: #f3f4f6;
            cursor: pointer;
        }

        .map-photo-thumb.active {
            border-color: #2563eb;
        }

        .map-photo-thumb img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        [class*="-balloon"] {
            max-width: calc(100vw - 24px);
        }

        [class*="-balloon__content"] {
            box-sizing: border-box;
            max-width: calc(100vw - 56px);
            overflow-wrap: anywhere;
        }

        #filter-container {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 1000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #filter-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        #dk-filter-toggle,
        #category-filter-toggle,
        #gibdd-toggle,
        #categories-select-all,
        #categories-clear-all {
            padding: 6px 14px;
            font-size: 12px;
            line-height: 1.2;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.14);
            background: rgba(255,255,255,0.95);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.14);
            transition: background 0.15s, box-shadow 0.15s, border-color 0.15s;
        }

        #dk-filter-toggle:hover,
        #category-filter-toggle:hover,
        #gibdd-toggle:hover,
        #categories-select-all:hover,
        #categories-clear-all:hover {
            background: #f5f5f5;
            box-shadow: 0 3px 8px rgba(0,0,0,0.16);
        }

        #dk-filter-toggle:focus-visible,
        #category-filter-toggle:focus-visible,
        #gibdd-toggle:focus-visible,
        #categories-select-all:focus-visible,
        #categories-clear-all:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }

        #gibdd-toggle.active {
            background: #e6f2ff;
            border-color: #3b82f6;
        }

        .filter-panel {
            display: none;
            width: 250px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(245, 245, 245, 0.96);
            box-shadow: 0 8px 18px rgba(0,0,0,0.16);
            margin-bottom: 8px;
        }

        .filter-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #222;
        }

        .filter-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #quantity-range {
            width: 100%;
        }

        #quantity-input {
            width: 100%;
            box-sizing: border-box;
            padding: 5px 7px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.2);
            font-size: 12px;
            background: #fff;
        }

        #filter-current-value {
            font-size: 11px;
            color: #555;
            margin-top: 6px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px 12px;
            margin-bottom: 10px;
        }

        .category-check-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #333;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .category-check-item input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #3b82f6;
            cursor: pointer;
            flex: 0 0 auto;
        }

        .category-actions {
            display: flex;
            gap: 8px;
        }

        @media (max-width: 640px) {
            .map-status {
                bottom: 12px;
                font-size: 12px;
            }

            .map-balloon {
                width: min(300px, calc(100vw - 72px));
            }

            .map-photo-grid {
                grid-template-columns: 1fr;
            }

            .map-photo-modal {
                align-items: stretch;
                padding: 10px;
            }

            .map-photo-modal__panel {
                width: 100%;
                max-height: calc(100vh - 20px);
                max-height: calc(100dvh - 20px);
            }

            .map-photo-modal__body {
                max-height: calc(100vh - 94px);
                max-height: calc(100dvh - 94px);
                padding: 12px;
            }

            .map-photo-viewer__stage {
                grid-template-columns: 38px minmax(0, 1fr) 38px;
                gap: 6px;
            }

            .map-photo-viewer__nav {
                width: 38px;
                height: 48px;
                font-size: 26px;
            }

            .map-photo-viewer__image-wrap {
                min-height: 220px;
                max-height: 54vh;
            }

            .map-photo-viewer__image {
                max-height: 54vh;
            }

            .map-photo-viewer__footer {
                align-items: stretch;
                flex-direction: column;
            }

            .map-photo-viewer__actions {
                justify-content: space-between;
            }

            .map-photo-viewer__download {
                flex: 1 1 auto;
            }

            .map-photo-thumbs {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            #filter-container {
                top: 52px;
                left: 8px;
                right: 8px;
                max-width: calc(100vw - 16px);
            }

            #filter-header {
                gap: 6px;
            }

            #dk-filter-toggle,
            #category-filter-toggle,
            #gibdd-toggle {
                padding: 6px 10px;
            }

            .filter-panel {
                width: 100%;
                max-width: 280px;
                max-height: calc(100vh - 112px);
                max-height: calc(100dvh - 112px);
                overflow-y: auto;
            }

            .category-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
<div id="map"></div>
<div id="map-status" class="map-status" role="status" aria-live="polite">Загрузка карты...</div>

<div id="filter-container">
    <div id="filter-header">
        <button type="button" id="dk-filter-toggle" aria-expanded="false" aria-controls="dk-filter-panel">Фильтр по ДК</button>
        <button type="button" id="category-filter-toggle" aria-expanded="false" aria-controls="category-filter-panel">Фильтр по категориям</button>
        <button type="button" id="gibdd-toggle" class="active" aria-pressed="true">ГИБДД</button>
    </div>

    <div id="dk-filter-panel" class="filter-panel">
        <div class="filter-title">Фильтр по ДК</div>

        <div class="filter-controls">
            <input type="range" id="quantity-range" min="0" max="100" value="0" step="1">
            <input type="number" id="quantity-input" min="0" value="0">
        </div>

        <div id="filter-current-value">Показываются точки с кол-вом ≥ 0</div>
    </div>

    <div id="category-filter-panel" class="filter-panel">
        <div class="filter-title">Фильтр по категориям</div>

        <div id="category-checkboxes" class="category-grid"></div>

        <div class="category-actions">
            <button type="button" id="categories-select-all">Все</button>
            <button type="button" id="categories-clear-all">Сброс</button>
        </div>
    </div>
</div>

<script src="index.js?v=20260626-photo-viewer-v3"></script>
</body>
</html>
