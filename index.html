<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=6c42bc19-1776-466a-900c-75c1c68e67f4" type="text/javascript"></script>

    <title>static_05_2026</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100vh;
            height: 100dvh;
        }

        .map-status {
            position: fixed;
            left: 50%;
            bottom: 20px;
            z-index: 1001;
            max-width: calc(100vw - 32px);
            padding: 8px 14px;
            transform: translateX(-50%);
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.12);
            background: rgba(255,255,255,0.96);
            color: #222;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13px;
            line-height: 1.25;
            box-shadow: 0 4px 14px rgba(0,0,0,0.16);
            text-align: center;
        }

        .map-status.error {
            border-color: #f87171;
            background: #fff1f2;
            color: #991b1b;
        }

        .map-status[hidden] {
            display: none;
        }

        .map-balloon {
            width: min(360px, calc(100vw - 96px));
            max-width: 100%;
            color: #111827;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .map-balloon__title {
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }

        .map-balloon__row {
            margin-top: 6px;
            font-size: 13px;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .map-balloon__label {
            font-weight: 700;
        }

        .map-balloon__quantity {
            color: #16a34a;
            font-weight: 700;
        }

        [class*="-balloon"] {
            max-width: calc(100vw - 24px);
        }

        [class*="-balloon__content"] {
            box-sizing: border-box;
            max-width: calc(100vw - 56px);
            overflow-wrap: anywhere;
        }

        #filter-container {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 1000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #filter-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        #dk-filter-toggle,
        #category-filter-toggle,
        #gibdd-toggle,
        #categories-select-all,
        #categories-clear-all {
            padding: 6px 14px;
            font-size: 12px;
            line-height: 1.2;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.14);
            background: rgba(255,255,255,0.95);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.14);
            transition: background 0.15s, box-shadow 0.15s, border-color 0.15s;
        }

        #dk-filter-toggle:hover,
        #category-filter-toggle:hover,
        #gibdd-toggle:hover,
        #categories-select-all:hover,
        #categories-clear-all:hover {
            background: #f5f5f5;
            box-shadow: 0 3px 8px rgba(0,0,0,0.16);
        }

        #dk-filter-toggle:focus-visible,
        #category-filter-toggle:focus-visible,
        #gibdd-toggle:focus-visible,
        #categories-select-all:focus-visible,
        #categories-clear-all:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }

        #gibdd-toggle.active {
            background: #e6f2ff;
            border-color: #3b82f6;
        }

        .filter-panel {
            display: none;
            width: 250px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(245, 245, 245, 0.96);
            box-shadow: 0 8px 18px rgba(0,0,0,0.16);
            margin-bottom: 8px;
        }

        .filter-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #222;
        }

        .filter-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #quantity-range {
            width: 100%;
        }

        #quantity-input {
            width: 100%;
            box-sizing: border-box;
            padding: 5px 7px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.2);
            font-size: 12px;
            background: #fff;
        }

        #filter-current-value {
            font-size: 11px;
            color: #555;
            margin-top: 6px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px 12px;
            margin-bottom: 10px;
        }

        .category-check-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #333;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .category-check-item input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #3b82f6;
            cursor: pointer;
            flex: 0 0 auto;
        }

        .category-actions {
            display: flex;
            gap: 8px;
        }

        @media (max-width: 640px) {
            .map-status {
                bottom: 12px;
                font-size: 12px;
            }

            .map-balloon {
                width: min(300px, calc(100vw - 72px));
            }

            #filter-container {
                top: 52px;
                left: 8px;
                right: 8px;
                max-width: calc(100vw - 16px);
            }

            #filter-header {
                gap: 6px;
            }

            #dk-filter-toggle,
            #category-filter-toggle,
            #gibdd-toggle {
                padding: 6px 10px;
            }

            .filter-panel {
                width: 100%;
                max-width: 280px;
                max-height: calc(100vh - 112px);
                max-height: calc(100dvh - 112px);
                overflow-y: auto;
            }

            .category-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
<div id="map"></div>
<div id="map-status" class="map-status" role="status" aria-live="polite">Загрузка карты...</div>

<div id="filter-container">
    <div id="filter-header">
        <button type="button" id="dk-filter-toggle" aria-expanded="false" aria-controls="dk-filter-panel">Фильтр по ДК</button>
        <button type="button" id="category-filter-toggle" aria-expanded="false" aria-controls="category-filter-panel">Фильтр по категориям</button>
        <button type="button" id="gibdd-toggle" class="active" aria-pressed="true">ГИБДД</button>
    </div>

    <div id="dk-filter-panel" class="filter-panel">
        <div class="filter-title">Фильтр по ДК</div>

        <div class="filter-controls">
            <input type="range" id="quantity-range" min="0" max="100" value="0" step="1">
            <input type="number" id="quantity-input" min="0" value="0">
        </div>

        <div id="filter-current-value">Показываются точки с кол-вом ≥ 0</div>
    </div>

    <div id="category-filter-panel" class="filter-panel">
        <div class="filter-title">Фильтр по категориям</div>

        <div id="category-checkboxes" class="category-grid"></div>

        <div class="category-actions">
            <button type="button" id="categories-select-all">Все</button>
            <button type="button" id="categories-clear-all">Сброс</button>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
